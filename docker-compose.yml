services:
  pocket-tts-wyoming:
    build: .
    container_name: pocket-tts-wyoming
    ports:
      - "10201:10201"
    environment:
      - WYOMING_PORT=10201
      - WYOMING_HOST=0.0.0.0
      - DEFAULT_VOICE=alba
      - MODEL_VARIANT=b6369a24
      - ZEROCONF=pocket-tts
    restart: unless-stopped
    volumes:
      - pocket-tts-hf-cache:/root/.cache/huggingface
      - pocket-tts-cache:/root/.cache/pocket_tts

  read-aloud:
    build:
      context: .
      dockerfile: Dockerfile.read-aloud
    profiles:
      - cli
    depends_on:
      - pocket-tts-wyoming
    volumes:
      - ./input:/input
      - ./output:/output
    stdin_open: true
    tty: true

volumes:
  pocket-tts-hf-cache:
    driver: local
  pocket-tts-cache:
    driver: local
